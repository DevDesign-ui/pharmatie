# =====================================================================
# PharmaSante - Gestion distribuee des stocks de medicaments
# Configuration Multi-DataSource (3 pharmacies independantes)
# Base de donnees : MySQL / MariaDB (XAMPP)
# =====================================================================

# --- Parametres communs Hibernate / JPA ---
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
# Dialecte MySQL (Hibernate 6 l'auto-detecte, on l'indique explicitement
# pour eviter toute ambiguite avec MariaDB fourni par XAMPP)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# --- Base 1 : Pharmacie Medina (DataSource primaire) ---
pharmasante.datasource.medina.jdbc-url=jdbc:mysql://localhost:3306/pharmacie_medina?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
pharmasante.datasource.medina.username=root
pharmasante.datasource.medina.password=
pharmasante.datasource.medina.driver-class-name=com.mysql.cj.jdbc.Driver
pharmasante.datasource.medina.pool-name=Pool-Medina
pharmasante.datasource.medina.maximum-pool-size=5

# --- Base 2 : Pharmacie Liberte ---
pharmasante.datasource.liberte.jdbc-url=jdbc:mysql://localhost:3306/pharmacie_liberte?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
pharmasante.datasource.liberte.username=root
pharmasante.datasource.liberte.password=
pharmasante.datasource.liberte.driver-class-name=com.mysql.cj.jdbc.Driver
pharmasante.datasource.liberte.pool-name=Pool-Liberte
pharmasante.datasource.liberte.maximum-pool-size=5

# --- Base 3 : Pharmacie Almadies ---
pharmasante.datasource.almadies.jdbc-url=jdbc:mysql://localhost:3306/pharmacie_almadies?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
pharmasante.datasource.almadies.username=root
pharmasante.datasource.almadies.password=
pharmasante.datasource.almadies.driver-class-name=com.mysql.cj.jdbc.Driver
pharmasante.datasource.almadies.pool-name=Pool-Almadies
pharmasante.datasource.almadies.maximum-pool-size=5

# --- Planification de la synchronisation (toutes les 60 secondes) ---
pharmasante.sync.enabled=true
pharmasante.sync.fixed-rate-ms=60000

# --- Application ---
server.port=8080
spring.application.name=pharma-stock
