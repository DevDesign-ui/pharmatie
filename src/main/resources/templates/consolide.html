<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments :: head('Stock consolide')}"></head>
<body>
<header th:replace="~{fragments :: header}"></header>

<main class="container">
    <div th:replace="~{fragments :: messages}"></div>

    <section class="hero">
        <div>
            <h1>Stock consolide</h1>
            <p class="subtitle">
                Fusion des stocks des trois pharmacies -
                <strong th:text="${total}">0</strong> medicaments au total.
            </p>
        </div>
        <form th:action="@{/sync}" method="post" class="inline">
            <button type="submit" class="btn btn-primary">Synchroniser maintenant</button>
        </form>
    </section>

    <table class="table" th:if="${medicaments != null and !medicaments.isEmpty()}">
        <thead>
        <tr>
            <th>Code</th>
            <th>Nom</th>
            <th>Categorie</th>
            <th>Pharmacie</th>
            <th class="num">Prix</th>
            <th class="num">Quantite</th>
            <th>Expiration</th>
            <th>MAJ</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="m : ${medicaments}">
            <td class="mono" th:text="${m.code}">CODE</td>
            <td th:text="${m.nom}">Nom</td>
            <td th:text="${m.categorie} ?: '-'">Categorie</td>
            <td>
                <span class="badge"
                      th:classappend="${m.pharmacie.name() == 'MEDINA'} ? 'badge-medina'
                        : (${m.pharmacie.name() == 'LIBERTE'} ? 'badge-liberte' : 'badge-almadies')"
                      th:text="${m.pharmacie.libelle}">Pharmacie</span>
            </td>
            <td class="num" th:text="${m.prix} + ' FCFA'">0</td>
            <td class="num" th:text="${m.quantite}">0</td>
            <td th:text="${m.dateExpiration != null ? #temporals.format(m.dateExpiration, 'dd/MM/yyyy') : '-'}">-</td>
            <td th:text="${m.updatedAt != null ? #temporals.format(m.updatedAt, 'dd/MM/yyyy HH:mm') : '-'}">-</td>
        </tr>
        </tbody>
    </table>

    <div class="empty" th:if="${medicaments == null or medicaments.isEmpty()}">
        <p>Aucun medicament a consolider pour le moment.</p>
    </div>
</main>

<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
