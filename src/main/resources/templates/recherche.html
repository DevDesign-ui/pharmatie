<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments :: head('Recherche')}"></head>
<body>
<header th:replace="~{fragments :: header}"></header>

<main class="container">
    <div th:replace="~{fragments :: messages}"></div>

    <section class="hero">
        <div>
            <h1>Rechercher un medicament</h1>
            <p class="subtitle">Recherche par code dans les trois pharmacies.</p>
        </div>
    </section>

    <form th:action="@{/recherche}" method="get" class="search-form">
        <input type="text" name="code" placeholder="Code du medicament (ex. MED-001)"
               th:value="${code}" class="input" required>
        <button type="submit" class="btn btn-primary">Rechercher</button>
    </form>

    <div th:if="${code != null}" class="results">
        <h2>Resultats pour le code "<span th:text="${code}"></span>"</h2>

        <table class="table" th:if="${resultats != null and !resultats.isEmpty()}">
            <thead>
            <tr>
                <th>Code</th>
                <th>Nom</th>
                <th>Pharmacie</th>
                <th class="num">Prix</th>
                <th class="num">Quantite</th>
                <th>MAJ</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="m : ${resultats}">
                <td class="mono" th:text="${m.code}">CODE</td>
                <td th:text="${m.nom}">Nom</td>
                <td>
                    <span class="badge"
                          th:classappend="${m.pharmacie.name() == 'MEDINA'} ? 'badge-medina'
                            : (${m.pharmacie.name() == 'LIBERTE'} ? 'badge-liberte' : 'badge-almadies')"
                          th:text="${m.pharmacie.libelle}">Pharmacie</span>
                </td>
                <td class="num" th:text="${m.prix} + ' FCFA'">0</td>
                <td class="num" th:text="${m.quantite}">0</td>
                <td th:text="${m.updatedAt != null ? #temporals.format(m.updatedAt, 'dd/MM/yyyy HH:mm') : '-'}">-</td>
            </tr>
            </tbody>
        </table>

        <div class="empty" th:if="${resultats == null or resultats.isEmpty()}">
            <p>Aucun medicament trouve avec ce code dans les trois pharmacies.</p>
        </div>
    </div>
</main>

<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
