<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="fr">
<head th:replace="~{fragments :: head('Formulaire medicament')}"></head>
<body>
<header th:replace="~{fragments :: header}"></header>

<main class="container">
    <div th:replace="~{fragments :: messages}"></div>

    <section class="hero">
        <div>
            <h1>
                <span th:if="${medicament.id == null}">Ajouter un medicament</span>
                <span th:if="${medicament.id != null}">Modifier le medicament</span>
            </h1>
            <p class="subtitle">Renseignez les informations du medicament.</p>
        </div>
    </section>

    <form class="form" th:action="@{/medicament}" method="post" th:object="${medicament}">
        <input type="hidden" th:field="*{id}">

        <div class="form-row">
            <label>
                <span>Pharmacie</span>
                <select th:field="*{pharmacie}" required>
                    <option th:each="p : ${pharmacies}"
                            th:value="${p.name()}"
                            th:text="${p.libelle}">Pharmacie</option>
                </select>
            </label>
            <label>
                <span>Code</span>
                <input type="text" th:field="*{code}" placeholder="ex. MED-001" required
                       th:readonly="${medicament.id != null}">
            </label>
        </div>

        <div class="form-row">
            <label>
                <span>Nom</span>
                <input type="text" th:field="*{nom}" placeholder="ex. Paracetamol" required>
            </label>
            <label>
                <span>Categorie</span>
                <input type="text" th:field="*{categorie}" placeholder="ex. Antidouleur">
            </label>
        </div>

        <label>
            <span>Description</span>
            <textarea th:field="*{description}" rows="3" placeholder="Description courte du medicament"></textarea>
        </label>

        <div class="form-row">
            <label>
                <span>Prix (FCFA)</span>
                <input type="number" step="0.01" min="0" th:field="*{prix}" placeholder="ex. 1500" required>
            </label>
            <label>
                <span>Quantite</span>
                <input type="number" step="1" min="0" th:field="*{quantite}" placeholder="ex. 50" required>
            </label>
        </div>

        <div class="form-row">
            <label>
                <span>Date de fabrication</span>
                <input type="date" th:field="*{dateFabrication}">
            </label>
            <label>
                <span>Date d'expiration</span>
                <input type="date" th:field="*{dateExpiration}">
            </label>
        </div>

        <div class="form-actions">
            <a class="btn btn-outline" th:href="@{/}">Annuler</a>
            <button type="submit" class="btn btn-primary">
                <span th:if="${medicament.id == null}">Enregistrer</span>
                <span th:if="${medicament.id != null}">Enregistrer les modifications</span>
            </button>
        </div>
    </form>
</main>

<footer th:replace="~{fragments :: footer}"></footer>
</body>
</html>
